# .github/workflows/aroidpedia-search-index.yml
#
# Rebuilds docs/search-index.json, which powers the header search typeahead.
#
# WHY DAILY, when the bibliography runs monthly:
# a bibliography that lags a few weeks is merely out of date, but a search
# index that lags means a visitor types the name of a page you published
# last week and is told it doesn't exist. The crawl is cheap - a handful of
# API calls, well under a minute - so daily costs nothing and keeps the gap
# to at most 24 hours.
#
# The script writes nothing when the site hasn't changed, so a commit
# appearing in the history always means real content moved.
#
# BOTH output files must be committed. search-index.json is what the site
# reads; search-index-cache.json is the per-page <lastmod> record that makes
# the next run incremental. Committing only the index would throw the cache
# away with the runner every night, and every run would crawl all 380 pages
# from cold - the incremental path would silently never engage.

name: Build Aroidpedia search index

on:
  schedule:
    - cron: "0 8 * * *"       # 08:00 UTC daily
  workflow_dispatch:           # run by hand from the Actions tab

permissions:
  contents: write              # the bot needs to push its commit
  pages: write                 # ...and to publish the result
  id-token: write              # required by actions/deploy-pages

# A hand-run started while the nightly one is going would race for the push.
# "pages" is shared with update-counts.yml so two workflows never deploy
# to Pages at the same time; they queue instead.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # Path is quoted: the folder name contains a space. Run from the repo
      # ROOT, since the script writes to docs/ relative to the working
      # directory - same convention as the bibliography build.
      - name: Crawl and build index
        run: python "Aroidpedia Search Index/build_search_index.py"

      - name: Commit if changed
        id: commit
        run: |
          git config user.name  "aroidpedia-bot"
          git config user.email "actions@github.com"
          git add docs/search-index.json docs/search-index-cache.json
          if git diff --staged --quiet; then
            echo "Search index unchanged."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Search index - $(date -u +'%Y-%m-%d')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ---- Publish to GitHub Pages -------------------------------------
      # Pages on this repo is Actions-sourced: pushing to main deploys
      # NOTHING. A file only reaches the .github.io URL when a workflow
      # uploads docs/ as an artifact and deploys it. update-counts.yml was
      # the only workflow doing that, which is why a freshly committed
      # search-index.json sat correctly in the repo while 404ing on Pages.
      #
      # The artifact is the whole docs/ folder, so this publishes whatever
      # is current there - counts, bibliographies and index alike. The
      # shared "pages" concurrency group keeps two workflows from
      # deploying over each other.
      - name: Sanity check /docs artifact
        if: steps.commit.outputs.changed == 'true'
        run: |
          test -d docs
          if find docs -type l | grep -q .; then
            echo "ERROR: Pages artifacts cannot contain symlinks."
            find docs -type l
            exit 1
          fi
          du -sh docs

      - name: Configure Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Upload /docs as Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: "docs"

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v5
