# .github/workflows/aroidpedia-biblio.yml
#
# Rebuilds every genus bibliography on the 1st of each month, and on demand.
# Commits to docs/ only when something actually changed, so each run gives you
# a clean, reviewable diff.
#
# NOTE: the script lives in a folder whose name contains a space, so the path
# must be quoted. It is run from the REPO ROOT (not from inside that folder)
# because it writes its output to docs/ relative to the working directory.

name: Compile Aroidpedia bibliographies

on:
  schedule:
    - cron: "0 9 1 * *"      # 09:00 UTC on the 1st of each month
  workflow_dispatch:          # lets you run it by hand from the Actions tab

permissions:
  contents: write             # required for the bot to push its commit
  pages: write                # ...and to publish the result
  id-token: write             # required by actions/deploy-pages

# "pages" is shared with update-counts.yml so two workflows never deploy
# to Pages at the same time; they queue instead.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  compile:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 reportlab

      - name: Crawl and build all genera
        run: python "Aroidpedia Bibliography/compile_aroidpedia_biblio.py"

      - name: Commit if changed
        id: commit
        run: |
          git config user.name  "aroidpedia-bot"
          git config user.email "actions@github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No bibliography changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Aroidpedia bibliographies - $(date -u +'%Y-%m-%d')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ---- Publish to GitHub Pages -------------------------------------
      # Pages on this repo is Actions-sourced: pushing to main deploys
      # NOTHING. A file only reaches the .github.io URL when a workflow
      # uploads docs/ as an artifact and deploys it. update-counts.yml was
      # the only workflow doing that, which is why a freshly committed
      # search-index.json sat correctly in the repo while 404ing on Pages.
      #
      # The artifact is the whole docs/ folder, so this publishes whatever
      # is current there - counts, bibliographies and index alike. The
      # shared "pages" concurrency group keeps two workflows from
      # deploying over each other.
      - name: Sanity check /docs artifact
        if: steps.commit.outputs.changed == 'true'
        run: |
          test -d docs
          if find docs -type l | grep -q .; then
            echo "ERROR: Pages artifacts cannot contain symlinks."
            find docs -type l
            exit 1
          fi
          du -sh docs

      - name: Configure Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Upload /docs as Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: "docs"

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v5
