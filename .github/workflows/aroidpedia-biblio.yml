name: Compile Aroidpedia bibliographies

on:
  schedule:
    - cron: "0 9 1 * *"      # 09:00 UTC, 1st of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4 reportlab

      - name: Crawl and build all genera
        run: python "Aroidpedia Bibliography/compile_aroidpedia_biblio.py"

      - name: Commit if changed
        run: |
          git config user.name  "aroidpedia-bot"
          git config user.email "actions@github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No bibliography changes."
          else
            git commit -m "Aroidpedia bibliographies — $(date -u +'%Y-%m-%d')"
            git push
          fi
