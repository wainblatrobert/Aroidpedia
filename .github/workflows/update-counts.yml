name: Update Aroidpedia Counts

on:
  schedule:
    - cron: "5 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-counts:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Generate counts
        run: node scripts/update-counts.mjs
        env:
          SITE_ORIGIN: "https://www.aroidpedia.com"
          COLLECTION_PATH: "/journal"
          OUT_FILE: "docs/counts.json"

      - name: Commit updated counts
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/counts.json
          if git diff --cached --quiet; then
            echo "No count changes to commit."
          else
            git commit -m "Update Aroidpedia counts"
            git push
          fi

      - name: Sanity check /docs artifact
        run: |
          test -d docs
          test -f docs/counts.json
          echo "Artifact size:"
          du -sh docs
          echo "Checking for symlinks:"
          if find docs -type l | grep -q .; then
            echo "ERROR: GitHub Pages artifacts cannot contain symlinks."
            find docs -type l
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload /docs as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
